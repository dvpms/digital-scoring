# Ensure only mpm_prefork is active. This file is loaded early in the
# conf-enabled directory so it takes effect before any other module
# configuration is processed.
#
# Unload any MPM that is not prefork (guards against packages that
# re-enable event or worker at install time).
<IfModule mpm_event_module>
    # mpm_event must not be loaded alongside mpm_prefork.
    # The mod_mpm_event.so file is removed at build time, but this
    # directive provides a runtime safety net.
</IfModule>

<IfModule mpm_worker_module>
    # Same guard for mpm_worker.
</IfModule>

# Confirm prefork is the active MPM.
<IfModule mpm_prefork_module>
    StartServers          5
    MinSpareServers       5
    MaxSpareServers      10
    MaxRequestWorkers   150
    MaxConnectionsPerChild 0
</IfModule>
