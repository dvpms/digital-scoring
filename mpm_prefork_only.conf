# mpm_prefork tuning configuration.
# mpm_event and mpm_worker .so files are removed at build time and their
# modules are never enabled, so only mpm_prefork is active.
<IfModule mpm_prefork_module>
    StartServers          5
    MinSpareServers       5
    MaxSpareServers      10
    MaxRequestWorkers   150
    MaxConnectionsPerChild 0
</IfModule>
